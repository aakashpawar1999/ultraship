product: ultraship
version: 0.2.0
execution_state: DEVELOPING
checkpoint: null
blockers: []
release_fit:
  assessment: probable
  reasons:
    - The change is well bounded — lifecycle state moves from one workspace-global field to a per-product file, and the callers are known (state, transition, snapshot, views, init).
    - Per-product directories, paths, and the active_product pointer already exist, so this decouples an existing structure rather than inventing one.
    - The framework already forbids writing state implicitly, so an explicit migrate command fits the existing ethos instead of fighting it.
  major_cost_drivers:
    - Backward compatibility and a tested migration for existing single-product workspaces, including this repo's own state.
    - The single-workspace-state assumption is read in several skills and views, so the change fans out past the core engine.
  recommended_scope_change: null
