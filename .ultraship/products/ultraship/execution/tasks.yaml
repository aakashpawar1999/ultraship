product: ultraship
version: 1.1.0
tasks:
  - id: US-ULTRASHIP-1.1.0-T01
    summary: Write CONTRIBUTING.md at the repo root — two halves, dev loop, SemVer classification, PR workflow.
    why_required: Without a contributing guide a stranger cannot tell how to build, test, or classify a change; the release outcome is unreachable.
    status: done
    depends_on: []
    acceptance_criteria:
      - CONTRIBUTING.md exists at the repo root and names both halves, the exact test commands (npm test and single-file forms), and links docs/CONTRACT.md and docs/COMPATIBILITY.md for the SemVer classification rule
    files:
      - CONTRIBUTING.md
    evidence:
      - CONTRIBUTING.md — "The two halves" section names skills vs the deterministic CLI; "Local development" gives npm test, the single-file (node --test test/validate.test.mjs) and name-pattern forms; "Classify your change" links docs/CONTRACT.md and docs/COMPATIBILITY.md with the major/minor/patch rule
  - id: US-ULTRASHIP-1.1.0-T02
    summary: Add CODE_OF_CONDUCT.md and SECURITY.md with a private disclosure channel and supported-version line.
    why_required: A contributable open project must set participation terms and a private path to report a vulnerability; both are absent today.
    status: done
    depends_on: []
    acceptance_criteria:
      - CODE_OF_CONDUCT.md and SECURITY.md exist; SECURITY.md states a private disclosure channel and the supported version line
    files:
      - CODE_OF_CONDUCT.md
      - SECURITY.md
    evidence:
      - CODE_OF_CONDUCT.md — Contributor Covenant 2.1 adaptation with an enforcement/reporting section
      - SECURITY.md — "Supported versions" table (latest 1.x supported, older 1.x upgrade, 0.x unsupported) and "Reporting a vulnerability" routes to GitHub private vulnerability reporting, not a public issue
  - id: US-ULTRASHIP-1.1.0-T03
    summary: Add .github pull-request and issue (bug + feature) templates.
    why_required: Templates are what make a submission arrive in a mergeable shape with the SemVer classification and test evidence a reviewer needs.
    status: done
    depends_on: []
    acceptance_criteria:
      - .github/PULL_REQUEST_TEMPLATE.md and .github/ISSUE_TEMPLATE/ (a bug and a feature template) exist and render on GitHub
    files:
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/ISSUE_TEMPLATE/bug_report.md
      - .github/ISSUE_TEMPLATE/feature_request.md
    evidence:
      - .github/PULL_REQUEST_TEMPLATE.md — prompts for what changed, a SemVer-classification checkbox set with the migrate question, and test-evidence checkboxes (npm test, validate)
      - .github/ISSUE_TEMPLATE/bug_report.md and feature_request.md — standard GitHub issue-template front matter (name/about/title/labels) so they render in the New Issue chooser
  - id: US-ULTRASHIP-1.1.0-T04
    summary: Add a GitHub Actions workflow running npm test on pull_request and push, Node 20+, zero deps.
    why_required: Without CI the "tests must pass" promise is prose only; CI enforces it on every pull request.
    status: done
    depends_on: []
    acceptance_criteria:
      - .github/workflows/ci.yml runs npm test on pull_request and push, on Node 20+, and passes on the current tree
    files:
      - .github/workflows/ci.yml
    evidence:
      - .github/workflows/ci.yml — triggers on push (main) and pull_request; matrix node [20, 22]; steps are checkout + setup-node + npm test + ultraship validate; no install step (yaml is vendored), preserving the zero-install guarantee
      - npm test — 227 passing, 0 failing on the current tree (the exact command CI runs)
      - node bin/ultraship.mjs validate — exit 0 (the second CI step)
  - id: US-ULTRASHIP-1.1.0-T05
    summary: Write docs/CONTRIBUTING-WITH-ULTRASHIP.md — the five-skill walkthrough for a change to this repo.
    why_required: The distinctive half of the outcome — showing a contributor how to use UltraShip on UltraShip — has no home without this guide.
    status: done
    depends_on:
      - US-ULTRASHIP-1.1.0-T01
    acceptance_criteria:
      - docs/CONTRIBUTING-WITH-ULTRASHIP.md walks brainstorm → plan → develop → iterate → complete for a change to this repository
    files:
      - docs/CONTRIBUTING-WITH-ULTRASHIP.md
    evidence:
      - docs/CONTRIBUTING-WITH-ULTRASHIP.md — "The five skills" section walks brainstorm → plan → develop → iterate → complete using this 1.1.0 release as the worked example; includes the repo conventions complete assumes (branch/tag/PR, release-after-merge, clean repo, no AI attribution) and a note on the dogfooded workspace
  - id: US-ULTRASHIP-1.1.0-T06
    summary: Link CONTRIBUTING, CODE_OF_CONDUCT, and SECURITY from the README.
    why_required: The entry points must be discoverable from the front page or a contributor never finds them.
    status: done
    depends_on:
      - US-ULTRASHIP-1.1.0-T01
      - US-ULTRASHIP-1.1.0-T02
    acceptance_criteria:
      - README links CONTRIBUTING.md, CODE_OF_CONDUCT.md, and SECURITY.md
    files:
      - README.md
    evidence:
      - README.md — new "Contributing" section links CONTRIBUTING.md, SECURITY.md, CODE_OF_CONDUCT.md, and docs/CONTRIBUTING-WITH-ULTRASHIP.md
