product: ultraship
version: 1.1.0
status: released
release_type: minor
outcome:
  user_can: >
    Contribute to UltraShip as an outside developer without reverse-engineering the
    repository first. A CONTRIBUTING guide explains the two halves that never mix —
    the agent-facing skills and the deterministic CLI — points at the frozen public
    contract and states the SemVer rule that changing a command, a skill, or a
    schema is a major bump, and shows exactly how to run the tests and open a pull
    request. A code of conduct and a security policy set the terms of participation
    and how to report a vulnerability privately. GitHub pull-request and issue
    templates guide every submission so a contributor supplies what a reviewer
    needs. CI runs the test suite on every pull request, so "tests must pass" is
    enforced by the repository rather than promised in prose. And the guide shows a
    contributor how to plan and ship their own change through UltraShip's five
    skills as a Minimum Complete Release — the framework used on itself.
  business_value: >
    A framework distributed as an open plugin lives or dies by whether people
    outside the original author can safely change it. Today the repository has a
    precise internal architecture and a frozen 1.0 contract but no front door:
    no CONTRIBUTING, no code of conduct, no security policy, no templates, no CI.
    A prospective contributor cannot tell which changes are safe, which force a
    major bump, or how the maintainer wants work submitted, so good contributions
    stall or arrive in a shape that cannot be merged. This release turns the
    project from readable-by-its-author into contributable-by-a-stranger, and does
    it in the project's own idiom by teaching contributors to use UltraShip to
    contribute to UltraShip — the most credible demonstration the framework has.
  evidence_of_value: >
    A CONTRIBUTING.md at the repo root explains the two-halves architecture, links
    docs/CONTRACT.md and docs/COMPATIBILITY.md, states the change-classification
    SemVer rule, and gives the exact test commands. CODE_OF_CONDUCT.md and
    SECURITY.md exist and state a private disclosure channel. .github/ holds a
    pull-request template and at least a bug and a feature issue template. A
    GitHub Actions workflow runs npm test on pull requests and pushes and passes.
    A "contributing with UltraShip" guide walks a contributor through brainstorm →
    plan → develop → iterate → complete for a change to this repo. README links
    the contributor entry points. ultraship validate exits 0 and npm test passes.
scope:
  included:
    - CONTRIBUTING.md at the repo root explaining the two halves (skills vs the deterministic CLI), the local dev loop (Node 20+, no install, npm test), the change-classification rule from docs/COMPATIBILITY.md (which changes are major/minor/patch and when migrate is needed), and the pull-request workflow
    - CODE_OF_CONDUCT.md setting expectations for participation
    - SECURITY.md stating a private vulnerability-disclosure channel and supported versions
    - .github/PULL_REQUEST_TEMPLATE.md prompting for the change, its SemVer classification, and test evidence
    - .github/ISSUE_TEMPLATE/ with a bug-report and a feature-request template
    - A GitHub Actions CI workflow (.github/workflows/ci.yml) that runs npm test on pull_request and push on Node 20+, kept dependency-free to match the zero-install guarantee
    - A "contributing with UltraShip" guide (docs/CONTRIBUTING-WITH-ULTRASHIP.md) showing a contributor how to drive their own change through the five skills against this repo's dogfooded workspace, including the git-flow and release-after-merge conventions the maintainer follows
    - README pointers to CONTRIBUTING, the code of conduct, and security policy
  excluded:
    - Any change to a CLI command, a skill, or a schema — this release adds contributor documentation and repository automation only, so it does not touch the frozen public contract
    - Governance beyond a code of conduct — no maintainer hierarchy, voting, or RFC process
    - Release-automation CI beyond running tests — no auto-publish, no tag-on-merge, no changelog generation in CI; publishing stays the maintainer's authorized manual step
    - Signed-commit or CLA enforcement tooling
    - Translating the guides or hosting a separate documentation site
  fallback_scope:
    - CONTRIBUTING.md (two halves, dev loop, SemVer classification, PR workflow), SECURITY.md, a pull-request template, and the CI workflow running npm test on pull requests. The code of conduct, the issue templates, and the dedicated contributing-with-UltraShip guide are the deferrable extension — CONTRIBUTING can carry a short "use the five skills" section inline until then. This still delivers a coherent outcome — a stranger can build, test, and submit a mergeable change with CI checking it.
acceptance:
  functional:
    - CONTRIBUTING.md exists at the repo root and names both halves, the exact test commands (npm test and single-file forms), and links docs/CONTRACT.md and docs/COMPATIBILITY.md for the SemVer classification rule
    - CODE_OF_CONDUCT.md and SECURITY.md exist; SECURITY.md states a private disclosure channel and the supported version line
    - .github/PULL_REQUEST_TEMPLATE.md and .github/ISSUE_TEMPLATE/ (a bug and a feature template) exist and render on GitHub
    - .github/workflows/ci.yml runs npm test on pull_request and push, on Node 20+, and passes on the current tree
    - docs/CONTRIBUTING-WITH-ULTRASHIP.md walks brainstorm → plan → develop → iterate → complete for a change to this repository
    - README links CONTRIBUTING.md, CODE_OF_CONDUCT.md, and SECURITY.md
  non_functional:
    - The CI workflow installs no runtime dependencies and runs only Node 20+ stdlib plus the vendored parser, preserving the zero-install guarantee
    - No CLI command, skill, or schema changes; the 1.0 public contract is untouched, so this is a clean minor bump
    - Documentation is accurate to the current code — every command and path referenced exists
  operational:
    - ultraship validate exits 0 on this workspace
    - npm test passes locally and in CI
    - version_files (package.json, .claude-plugin/plugin.json, .claude-plugin/marketplace.json) all read 1.1.0 at release
delivery:
  target_mode: release-ready
  environment: The GitHub repository itself (zeroonething/ultraship) — documentation, templates, and the Actions workflow live in the repo; there is no separate deploy surface for contributor docs
  deployment_method: Files committed on a feature branch and opened as a pull request; release-ready on merge to main. The maintainer's existing release-after-merge and plugin-marketplace publish flow carries the version bump; this release adds no new deploy automation.
  migrations:
    - None. No canonical schema changes; a 1.0 workspace needs no migration to work with 1.1.
  observability:
    - The CI workflow's pass/fail on each pull request is the ongoing health signal; ultraship validate and npm test are the release health checks
  rollback: Revert the pull-request merge commit. The added files are inert documentation, templates, and a CI workflow; removing them restores the 1.0 repository with no state to unwind. migrate is unaffected because no schema changed.
dependencies:
  products: []
  services:
    - GitHub Actions to run the CI workflow (free for public repositories); the workflow is plain node --test and degrades to local npm test if Actions is unavailable
  human_approvals:
    - The maintainer reviews and merges the pull request and confirms the CONTRIBUTING conventions (git-flow, release-after-merge, no-AI-attribution) match how the project is actually run
risks:
  - Contributor docs drift from the code as the CLI evolves. Mitigated by keeping CONTRIBUTING pointed at the already-maintained docs/CONTRACT.md and docs/COMPATIBILITY.md rather than restating their content, so there is one source of truth.
  - The CI workflow could smuggle in a dependency or a non-stdlib runner and break the zero-install guarantee. Mitigated by making the workflow a bare actions/checkout + setup-node + npm test, asserted in the acceptance criteria.
  - A code of conduct and security policy imply a maintainer commitment (enforcement, disclosure response) the solo maintainer must be willing to make. Mitigated by keeping both minimal and honest about response expectations rather than promising an SLA.
  - The contributing-with-UltraShip guide describes the dogfooded workspace, which a contributor's own change will move through states; the guide must tell them not to commit competing canonical state on a doc-only change. Mitigated by an explicit note on when a contribution does and does not touch .ultraship.
resource_profile:
  complexity: small
  uncertainty: low
  likely_cost_drivers:
    - Writing a CONTRIBUTING guide that is accurate to the two-halves architecture and the SemVer classification without duplicating the contract docs
    - Getting the CI workflow minimal and green while preserving the zero-dependency guarantee
    - Making the contributing-with-UltraShip guide concrete against this repo's own dogfooded workspace
  preferred_tools:
    - Claude Code
  constraints:
    - Zero runtime npm dependencies; CI adds no runtime dependency
    - Node 20 or newer
    - The CLI never calls a model and never touches the network
    - No change to the 1.0 public contract
open_questions:
  - Does SECURITY.md route private disclosure to GitHub private vulnerability reporting or to a maintainer email? Decided in develop with the maintainer.
  - Is the contributing-with-UltraShip walkthrough its own docs/ file or a long section inside CONTRIBUTING.md? Leaning a separate docs file linked from CONTRIBUTING. Decided in develop.
  - Does CI also run on a schedule or only on pull_request and push? Leaning pull_request and push only, to keep it minimal. Decided in develop.
released_at: 2026-07-22T00:00:00Z
mode: release-ready
delivered: >
  An outside developer can go from wanting to help to a merged contribution.
  CONTRIBUTING.md explains the two halves, the local test loop, and the SemVer
  classification that decides the bump; CODE_OF_CONDUCT.md and SECURITY.md set the
  terms of participation and a private disclosure channel; GitHub pull-request and
  issue templates prompt for the classification and test evidence; a CI workflow
  runs npm test and ultraship validate on every push and pull request across Node
  20 and 22; and docs/CONTRIBUTING-WITH-ULTRASHIP.md shows a contributor how to
  drive their own change through the five skills, using this release as the worked
  example. The README links all of it. No CLI command, skill, or schema changed.
evidence:
  tests:
    - npm test — 227 passing, 0 failing (the exact command CI runs)
  builds:
    - No build step; pure ESM CLI with a vendored YAML parser and zero runtime dependencies. No install step in CI either.
  reviews: []
  deployments: []
  health_checks:
    - node bin/ultraship.mjs validate — exit 0, 17 files checked (also the second CI step)
known_limitations:
  - mode is release-ready, not published. Per the release-after-merge workflow, the durable GitHub release and any plugin-marketplace re-publish are the maintainer's authorized steps after this pull request merges to main; the publish delivery_hook is defined for the published mode only, so ultraship deploy had nothing to run for release-ready.
  - The CI workflow is verified by inspection and by running its exact steps locally (npm test, ultraship validate); it first executes on GitHub Actions once the branch is pushed, so its green run on GitHub is confirmed post-merge, not at release time.
  - The code of conduct and security policy commit a solo maintainer to enforcement and disclosure response with no SLA; both are deliberately minimal and honest about response expectations rather than promising a timeline.
supersedes: 1.0.0
next_recommended_version: null
immutable: true
